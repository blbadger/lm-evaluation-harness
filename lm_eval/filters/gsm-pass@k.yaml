include: gsm8k_pass@k.yaml
tag:
  - chain_of_thought
  - self_consistency
task: gsm8k_cot_self_consistency
generation_kwargs:
  until:
    - "Q:"
    - "\n\n"
  do_sample: true
  top_p: 0.9
repeats: 10
filter_list:
  - name: "pass@10"
    filter:
    - function: "regex"
      group_select: -1
      regex_pattern: "(-?[$0-9.,]{2,})|(-?[0-9]+)"
    - function: "take_first_k"
      k: 10

metadata:
  version: 2.0
